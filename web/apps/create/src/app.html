<!doctype html>
<html lang="en" data-theme="glass-porcelain">

<head>
	<meta charset="utf-8" />
	<link rel="icon" href="%sveltekit.assets%/favicon.svg" />

	<!-- SES/Svelte 5 Compatibility Patch: runtime defensive shim against extension lockdown -->
	<script>
		(function () {
			if (typeof window === 'undefined') return;
			// Patch Object.getOwnPropertyDescriptor to fool Svelte 5 when SES locks down intrinsics
			var originalGOPD = Object.getOwnPropertyDescriptor;
			var domProps = ['nextSibling', 'previousSibling', 'firstChild', 'lastChild', 'childNodes'];

			Object.getOwnPropertyDescriptor = function (obj, prop) {
				var desc = originalGOPD(obj, prop);
				if ((obj === Node.prototype || obj === Element.prototype) && domProps.indexOf(prop) !== -1) {
					// If descriptor is missing or SES removed the getter
					if (!desc || !desc.get) {
						return {
							configurable: true, enumerable: true,
							get: function () { return this[prop]; }
						};
					}
				}
				return desc;
			};
		})();
	</script>
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
	<meta name="theme-color" content="#F8F8FA" media="(prefers-color-scheme: light)" />
	<meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)" />
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Saira:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
		rel="stylesheet">

	<!-- DOM Preservation - MUST RUN FIRST before any extensions can lockdown -->
	<script>
		(function () {
			// Capture native DOM getters before browser extensions can freeze them
			var nodeProto = Node.prototype;
			var elemProto = Element.prototype;
			window.__NATIVE_DOM_REFS__ = {
				nextSibling: Object.getOwnPropertyDescriptor(nodeProto, 'nextSibling'),
				previousSibling: Object.getOwnPropertyDescriptor(nodeProto, 'previousSibling'),
				firstChild: Object.getOwnPropertyDescriptor(nodeProto, 'firstChild'),
				lastChild: Object.getOwnPropertyDescriptor(nodeProto, 'lastChild'),
				parentNode: Object.getOwnPropertyDescriptor(nodeProto, 'parentNode'),
				parentElement: Object.getOwnPropertyDescriptor(nodeProto, 'parentElement'),
				childNodes: Object.getOwnPropertyDescriptor(nodeProto, 'childNodes'),
				nextElementSibling: Object.getOwnPropertyDescriptor(elemProto, 'nextElementSibling'),
				previousElementSibling: Object.getOwnPropertyDescriptor(elemProto, 'previousElementSibling'),
				firstElementChild: Object.getOwnPropertyDescriptor(elemProto, 'firstElementChild'),
				lastElementChild: Object.getOwnPropertyDescriptor(elemProto, 'lastElementChild'),
				children: Object.getOwnPropertyDescriptor(elemProto, 'children'),
				textContent: Object.getOwnPropertyDescriptor(nodeProto, 'textContent'),
				preserved: true
			};
		})();
	</script>

	<!-- Theme script to prevent flash during hydration -->
	<script>
		(function () {
			try {
				var stored = localStorage.getItem('zarf_theme');
				var theme = 'dark'; // default

				if (stored === 'light' || stored === 'dark') {
					theme = stored;
				} else {
					localStorage.setItem('zarf_theme', 'dark');
				}

				// Map theme name to the data-theme attribute consumed by Tailwind v4 @theme registration
				var themeName = theme === 'light' ? 'paper-porcelain' : 'glass-porcelain';
				document.documentElement.setAttribute('data-theme', themeName);
			} catch (e) { }
		})();
	</script>

	%sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
	<div style="display: contents">%sveltekit.body%</div>
</body>

</html>
