name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  soroban:
    name: Soroban Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32v1-none
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: |
            contracts/soroban/verifier
            contracts/soroban/zarf/jwk-registry
            contracts/soroban/zarf/vesting
            contracts/soroban/zarf/factory
            contracts/soroban/zarf/airdrop
            contracts/soroban/zarf/airdrop-factory

      - name: Build verifier WASM
        run: cargo build --manifest-path contracts/soroban/verifier/Cargo.toml --target wasm32v1-none --release

      - name: Build Zarf contract WASMs
        run: |
          cargo build --manifest-path contracts/soroban/zarf/jwk-registry/Cargo.toml --target wasm32v1-none --release
          cargo build --manifest-path contracts/soroban/zarf/vesting/Cargo.toml --target wasm32v1-none --release
          cargo build --manifest-path contracts/soroban/zarf/factory/Cargo.toml --target wasm32v1-none --release

      # airdrop-factory's test embeds the instance wasm (include_bytes!/
      # contractimport!), so the instance must build --release FIRST.
      - name: Build airdrop contract WASMs
        run: |
          cargo build --manifest-path contracts/soroban/zarf/airdrop/Cargo.toml --target wasm32v1-none --release
          cargo build --manifest-path contracts/soroban/zarf/airdrop-factory/Cargo.toml --target wasm32v1-none --release

      - name: Test verifier
        run: cargo test --manifest-path contracts/soroban/verifier/Cargo.toml

      - name: Test JWK registry
        run: cargo test --manifest-path contracts/soroban/zarf/jwk-registry/Cargo.toml

      - name: Test vesting
        run: cargo test --manifest-path contracts/soroban/zarf/vesting/Cargo.toml

      - name: Test factory
        run: cargo test --manifest-path contracts/soroban/zarf/factory/Cargo.toml

      - name: Test airdrop
        run: cargo test --manifest-path contracts/soroban/zarf/airdrop/Cargo.toml

      - name: Test airdrop factory
        run: cargo test --manifest-path contracts/soroban/zarf/airdrop-factory/Cargo.toml

      # fmt + clippy gate the two NEW airdrop crates only; the ZK-core crates
      # predate this gate and are intentionally left out (see 17-m7 §7-M1).
      - name: Format airdrop crates
        run: |
          cargo fmt --manifest-path contracts/soroban/zarf/airdrop/Cargo.toml --check
          cargo fmt --manifest-path contracts/soroban/zarf/airdrop-factory/Cargo.toml --check

      - name: Clippy airdrop crates
        run: |
          cargo clippy --manifest-path contracts/soroban/zarf/airdrop/Cargo.toml --all-targets -- -D warnings
          cargo clippy --manifest-path contracts/soroban/zarf/airdrop-factory/Cargo.toml --all-targets -- -D warnings

  web:
    name: Web, Core, and Workers
    runs-on: ubuntu-latest
    # Minimum Stellar config so the SvelteKit `analyse` pass can evaluate
    # `+layout.ts`'s `coreInit` import without throwing. These are public
    # testnet defaults — CI does not deploy, so no secrets are needed.
    env:
      VITE_STELLAR_DEFAULT_NETWORK: testnet
      VITE_STELLAR_TESTNET_RPC_URL: https://soroban-testnet.stellar.org
      VITE_STELLAR_TESTNET_HORIZON_URL: https://horizon-testnet.stellar.org
      VITE_STELLAR_TESTNET_FACTORY_ADDRESS: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAB7
      # airdrop apps' coreInit throws at module-eval without their own factory
      # address (read by +layout.ts → build/smoke fail). Public testnet dummy.
      VITE_STELLAR_TESTNET_AIRDROP_FACTORY_ADDRESS: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAB7
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.23.0

      - name: Install dependencies
        run: pnpm --dir web install --frozen-lockfile

      - name: Test core
        run: pnpm --dir web --filter @zarf/core test

      - name: Test indexer
        run: pnpm --dir web --filter @zarf/indexer test

      - name: Check shared types
        run: pnpm --dir web check:type-forks

      - name: Check Svelte apps
        run: |
          pnpm --dir web --filter @zarf/landing check
          pnpm --dir web --filter @zarf/create check
          pnpm --dir web --filter @zarf/claim check
          pnpm --dir web --filter @zarf/airdrop-create check
          pnpm --dir web --filter @zarf/airdrop-claim check

      - name: Check worker apps
        run: |
          pnpm --dir web --filter @zarf/indexer typecheck
          pnpm --dir web --filter @zarf/pin-proxy typecheck
          pnpm --dir web --filter @zarf/jwk-rotation typecheck

      # Drift gates — no build artifacts required.
      - name: Check explicit any allow-list
        run: pnpm --dir web check:any

      - name: Check direct console.* allow-list
        run: pnpm --dir web check:console

      # Airdrop Rust fixture == web byte-copy (sha256). Runs before the builds:
      # a drift here means the contract and the off-chain builder compute
      # different Merkle roots, so every claim would silently fail InvalidProof.
      - name: Check Merkle vectors in sync
        run: pnpm --dir web check:merkle-vectors

      # Build apps so check:budget has manifests + immutable assets to
      # measure. Builds run sequentially because the apps share the same
      # pnpm store and vite worker pool; parallelizing here has not shown
      # meaningful wall-clock savings in local timing.
      - name: Build landing app
        run: pnpm --dir web build:landing

      - name: Build claim app
        run: pnpm --dir web build:claim

      - name: Build create app
        run: pnpm --dir web build:create

      - name: Build airdrop create app
        run: pnpm --dir web build:airdrop-create

      - name: Build airdrop claim app
        run: pnpm --dir web build:airdrop-claim

      - name: Check bundle budget (initialGz + totalGz per app)
        run: pnpm --dir web check:budget

      # Boot `vite dev` for every app and curl the SSR routes.
      # Catches module-evaluation crashes (e.g. a top-level
      # stellar-sdk + buffer import that 500s during SSR but passes
      # both build and svelte-check). Fixed-port script so the CI log
      # makes failures easy to attribute.
      - name: Smoke SSR routes (vite dev)
        run: pnpm --dir web smoke:routes
