name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  soroban:
    name: Soroban Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch
        with:
          # The SHA pin freezes the action code; the toolchain channel must
          # now be selected explicitly (it normally comes from the ref name).
          toolchain: stable
          targets: wasm32v1-none
          components: clippy, rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: |
            contracts/soroban/verifier
            contracts/soroban/zarf/jwk-registry
            contracts/soroban/zarf/vesting
            contracts/soroban/zarf/factory

      - name: Rustfmt check
        run: |
          for crate in \
            contracts/soroban/verifier \
            contracts/soroban/verifier/ultrahonk-soroban-verifier \
            contracts/soroban/zarf/jwk-registry \
            contracts/soroban/zarf/vesting \
            contracts/soroban/zarf/factory; do
            cargo fmt --manifest-path "$crate/Cargo.toml" --check
          done

      # WASM artifacts MUST be built before clippy: `clippy --all-targets`
      # compiles the integration-test targets, which `include_bytes!` /
      # `contractimport!` these release WASMs (gitignored, absent on a cold
      # checkout). Building first keeps the Soroban job green from a clean
      # runner instead of dying on a missing-WASM compile error.
      - name: Build verifier WASM
        run: cargo build --manifest-path contracts/soroban/verifier/Cargo.toml --target wasm32v1-none --release

      - name: Build Zarf contract WASMs
        run: |
          cargo build --manifest-path contracts/soroban/zarf/jwk-registry/Cargo.toml --target wasm32v1-none --release
          cargo build --manifest-path contracts/soroban/zarf/vesting/Cargo.toml --target wasm32v1-none --release
          cargo build --manifest-path contracts/soroban/zarf/factory/Cargo.toml --target wasm32v1-none --release

      - name: Clippy (deny warnings)
        run: |
          for crate in \
            contracts/soroban/verifier \
            contracts/soroban/verifier/ultrahonk-soroban-verifier \
            contracts/soroban/zarf/jwk-registry \
            contracts/soroban/zarf/vesting \
            contracts/soroban/zarf/factory; do
            cargo clippy --manifest-path "$crate/Cargo.toml" --all-targets -- -D warnings
          done

      - name: Test verifier
        run: cargo test --manifest-path contracts/soroban/verifier/Cargo.toml

      # The vendored crate is a path dependency, so its integration tests do
      # NOT run via the wrapper's `cargo test` above. Run them explicitly so
      # the adversarial/soundness suite (incl. the on-curve pairing-point guard
      # and Fr-boundary cases) is actually exercised in CI.
      - name: Test ultrahonk verifier crate
        run: cargo test --manifest-path contracts/soroban/verifier/ultrahonk-soroban-verifier/Cargo.toml

      - name: Test JWK registry
        run: cargo test --manifest-path contracts/soroban/zarf/jwk-registry/Cargo.toml

      - name: Test vesting
        run: cargo test --manifest-path contracts/soroban/zarf/vesting/Cargo.toml

      - name: Test factory
        run: cargo test --manifest-path contracts/soroban/zarf/factory/Cargo.toml

  circuits:
    name: Noir Circuit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cache nargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nargo
          key: nargo-1.0.0-beta.18-${{ hashFiles('circuits/Nargo.toml') }}

      - name: Install Noir
        run: |
          curl -sL https://raw.githubusercontent.com/noir-lang/noirup/main/install | bash
          echo "$HOME/.nargo/bin" >> "$GITHUB_PATH"
          "$HOME/.nargo/bin/noirup" -v 1.0.0-beta.18

      - name: Build circuit
        run: nargo compile
        working-directory: circuits

      - name: Test circuit
        run: nargo test
        working-directory: circuits

  security-scan:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch
        with:
          toolchain: stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Cargo audit (contracts)
        # Advisory feed can flap on transitive crates; surface findings without
        # failing the build until the set is triaged.
        continue-on-error: true
        run: |
          for crate in \
            contracts/soroban/verifier \
            contracts/soroban/zarf/jwk-registry \
            contracts/soroban/zarf/vesting \
            contracts/soroban/zarf/factory; do
            cargo audit --file "$crate/Cargo.lock" || true
          done

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.23.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: pnpm audit (web)
        continue-on-error: true
        run: pnpm --dir web audit --audit-level=high

  web:
    name: Web, Core, and Workers
    runs-on: ubuntu-latest
    # Minimum Stellar config so the SvelteKit `analyse` pass can evaluate
    # `+layout.ts`'s `coreInit` import without throwing. These are public
    # testnet defaults — CI does not deploy, so no secrets are needed.
    env:
      VITE_STELLAR_DEFAULT_NETWORK: testnet
      VITE_STELLAR_TESTNET_RPC_URL: https://soroban-testnet.stellar.org
      VITE_STELLAR_TESTNET_HORIZON_URL: https://horizon-testnet.stellar.org
      VITE_STELLAR_TESTNET_FACTORY_ADDRESS: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAB7
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.23.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm --dir web install --frozen-lockfile

      # Non-blocking until a one-time `prettier --write .` clears the
      # pre-existing baseline drift (a handful of files predating this gate).
      # Flip to blocking by removing continue-on-error once the tree is clean.
      - name: Prettier format check
        continue-on-error: true
        run: pnpm --dir web format:check

      - name: ESLint
        run: pnpm --dir web lint

      - name: Run unit tests (core, ui, create)
        run: pnpm --dir web -r --if-present test

      - name: Check shared types
        run: pnpm --dir web check:type-forks

      - name: Check Svelte apps
        run: |
          pnpm --dir web --filter @zarf/landing check
          pnpm --dir web --filter @zarf/create check
          pnpm --dir web --filter @zarf/claim check

      - name: Check worker apps
        run: |
          pnpm --dir web --filter @zarf/indexer typecheck
          pnpm --dir web --filter @zarf/pin-proxy typecheck
          pnpm --dir web --filter @zarf/jwk-rotation typecheck

      # Drift gates — no build artifacts required.
      - name: Check explicit any allow-list
        run: pnpm --dir web check:any

      - name: Check direct console.* allow-list
        run: pnpm --dir web check:console

      # Build apps so check:budget has manifests + immutable assets to
      # measure. Builds run sequentially because the three apps share
      # the same pnpm store and vite worker pool; parallelizing here
      # has not shown meaningful wall-clock savings in local timing.
      - name: Build landing app
        run: pnpm --dir web build:landing

      - name: Build claim app
        run: pnpm --dir web build:claim

      - name: Build create app
        run: pnpm --dir web build:create

      - name: Check bundle budget (initialGz + totalGz per app)
        run: pnpm --dir web check:budget

      # Boot `vite dev` for all three apps and curl the SSR routes.
      # Catches module-evaluation crashes (e.g. a top-level
      # stellar-sdk + buffer import that 500s during SSR but passes
      # both build and svelte-check). Fixed-port script so the CI log
      # makes failures easy to attribute.
      - name: Smoke SSR routes (vite dev)
        run: pnpm --dir web smoke:routes
