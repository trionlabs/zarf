name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy ${{ matrix.app }}
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: deploy-${{ matrix.app }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: landing
            package: "@zarf/landing"
            kind: svelte
            url: https://zarf.to
          - app: create
            package: "@zarf/create"
            kind: svelte
            url: https://create.zarf.to
          - app: claim
            package: "@zarf/claim"
            kind: svelte
            url: https://claim.zarf.to
          - app: indexer
            package: "@zarf/indexer"
            kind: worker
            url: https://indexer.zarf.to
          - app: pin-proxy
            package: "@zarf/pin-proxy"
            kind: worker
            url: zarf-pin-proxy
          - app: jwk-rotation
            package: "@zarf/jwk-rotation"
            kind: worker
            url: https://jwt.zarf.to
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID || secrets.VITE_GOOGLE_CLIENT_ID }}
      VITE_INDEXER_URL: ${{ vars.VITE_INDEXER_URL || secrets.VITE_INDEXER_URL || 'https://indexer.zarf.to' }}
      VITE_PIN_PROXY_URL: ${{ vars.VITE_PIN_PROXY_URL || secrets.VITE_PIN_PROXY_URL }}
      VITE_STELLAR_DEFAULT_NETWORK: ${{ vars.VITE_STELLAR_DEFAULT_NETWORK || secrets.VITE_STELLAR_DEFAULT_NETWORK }}
      VITE_STELLAR_TESTNET_RPC_URL: ${{ vars.VITE_STELLAR_TESTNET_RPC_URL || secrets.VITE_STELLAR_TESTNET_RPC_URL }}
      VITE_STELLAR_TESTNET_FACTORY_ADDRESS: ${{ vars.VITE_STELLAR_TESTNET_FACTORY_ADDRESS || secrets.VITE_STELLAR_TESTNET_FACTORY_ADDRESS }}
      VITE_STELLAR_MAINNET_RPC_URL: ${{ vars.VITE_STELLAR_MAINNET_RPC_URL || secrets.VITE_STELLAR_MAINNET_RPC_URL }}
      VITE_STELLAR_MAINNET_FACTORY_ADDRESS: ${{ vars.VITE_STELLAR_MAINNET_FACTORY_ADDRESS || secrets.VITE_STELLAR_MAINNET_FACTORY_ADDRESS }}
      STELLAR_TESTNET_RPC_URL: ${{ vars.STELLAR_TESTNET_RPC_URL || secrets.STELLAR_TESTNET_RPC_URL || vars.VITE_STELLAR_TESTNET_RPC_URL || secrets.VITE_STELLAR_TESTNET_RPC_URL }}
      STELLAR_TESTNET_FACTORY_ADDRESS: ${{ vars.STELLAR_TESTNET_FACTORY_ADDRESS || secrets.STELLAR_TESTNET_FACTORY_ADDRESS || vars.VITE_STELLAR_TESTNET_FACTORY_ADDRESS || secrets.VITE_STELLAR_TESTNET_FACTORY_ADDRESS }}
      STELLAR_TESTNET_NETWORK_PASSPHRASE: ${{ vars.STELLAR_TESTNET_NETWORK_PASSPHRASE || secrets.STELLAR_TESTNET_NETWORK_PASSPHRASE }}
      STELLAR_MAINNET_RPC_URL: ${{ vars.STELLAR_MAINNET_RPC_URL || secrets.STELLAR_MAINNET_RPC_URL || vars.VITE_STELLAR_MAINNET_RPC_URL || secrets.VITE_STELLAR_MAINNET_RPC_URL }}
      STELLAR_MAINNET_FACTORY_ADDRESS: ${{ vars.STELLAR_MAINNET_FACTORY_ADDRESS || secrets.STELLAR_MAINNET_FACTORY_ADDRESS || vars.VITE_STELLAR_MAINNET_FACTORY_ADDRESS || secrets.VITE_STELLAR_MAINNET_FACTORY_ADDRESS }}
      STELLAR_MAINNET_NETWORK_PASSPHRASE: ${{ vars.STELLAR_MAINNET_NETWORK_PASSPHRASE || secrets.STELLAR_MAINNET_NETWORK_PASSPHRASE }}
      PINATA_JWT: ${{ secrets.PINATA_JWT }}
      REGISTRY_OWNER_SECRET: ${{ secrets.REGISTRY_OWNER_SECRET }}
      ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
      ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Check Cloudflare secrets
        run: |
          missing=()
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::error::Missing required GitHub secret(s): %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Check frontend environment
        if: ${{ matrix.kind == 'svelte' }}
        env:
          APP_NAME: ${{ matrix.app }}
        run: |
          has_profile() {
            local prefix="$1"
            for suffix in RPC_URL FACTORY_ADDRESS; do
              local name="VITE_STELLAR_${prefix}_${suffix}"
              if [ -z "${!name:-}" ]; then
                return 1
              fi
            done
            return 0
          }

          missing=()
          if ! has_profile TESTNET; then
            missing+=(VITE_STELLAR_TESTNET_RPC_URL VITE_STELLAR_TESTNET_FACTORY_ADDRESS)
          fi

          if ! has_profile MAINNET; then
            echo '::warning::Mainnet profile needs VITE_STELLAR_MAINNET_RPC_URL and VITE_STELLAR_MAINNET_FACTORY_ADDRESS. The deployed UI will only offer configured Stellar networks.'
          fi

          if [ "$APP_NAME" = "create" ]; then
            if [ -z "${VITE_INDEXER_URL:-}" ]; then
              missing+=(VITE_INDEXER_URL)
            fi
            if [ -z "${VITE_PIN_PROXY_URL:-}" ]; then
              missing+=(VITE_PIN_PROXY_URL)
            fi
          fi

          if [ "$APP_NAME" = "claim" ]; then
            if [ -z "${VITE_INDEXER_URL:-}" ]; then
              missing+=(VITE_INDEXER_URL)
            fi
            if [ -z "${VITE_GOOGLE_CLIENT_ID:-}" ]; then
              missing+=(VITE_GOOGLE_CLIENT_ID)
            fi
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::error::Missing required frontend env for %s: %s\n' "$APP_NAME" "${missing[*]}"
            exit 1
          fi

      - name: Check Worker runtime secrets
        if: ${{ matrix.app == 'pin-proxy' || matrix.app == 'jwk-rotation' || matrix.app == 'indexer' }}
        env:
          APP_NAME: ${{ matrix.app }}
        run: |
          missing=()

          if [ "$APP_NAME" = "pin-proxy" ] && [ -z "${PINATA_JWT:-}" ]; then
            missing+=(PINATA_JWT)
          fi

          if [ "$APP_NAME" = "jwk-rotation" ]; then
            if [ -z "${REGISTRY_OWNER_SECRET:-}" ]; then
              missing+=(REGISTRY_OWNER_SECRET)
            fi
            if [ -z "${ADMIN_TOKEN:-}" ]; then
              missing+=(ADMIN_TOKEN)
            fi
          fi

          if [ "$APP_NAME" = "indexer" ]; then
            for name in STELLAR_TESTNET_RPC_URL STELLAR_TESTNET_FACTORY_ADDRESS; do
              if [ -z "${!name:-}" ]; then
                missing+=("$name")
              fi
            done
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::error::Missing required GitHub secret(s) for %s: %s\n' "$APP_NAME" "${missing[*]}"
            exit 1
          fi

      - name: Deploy ${{ matrix.app }}
        env:
          PACKAGE_NAME: ${{ matrix.package }}
        run: |
          pnpm --filter "$PACKAGE_NAME" run deploy
        working-directory: web

      - name: Sync Worker runtime secrets
        if: ${{ matrix.app == 'pin-proxy' || matrix.app == 'jwk-rotation' || matrix.app == 'indexer' }}
        env:
          APP_NAME: ${{ matrix.app }}
          PACKAGE_NAME: ${{ matrix.package }}
        run: |
          secret_file="$(mktemp)"
          trap 'rm -f "$secret_file"' EXIT

          SECRET_FILE="$secret_file" node <<'NODE'
          const fs = require("node:fs");

          const appName = process.env.APP_NAME;
          let secrets;

          if (appName === "jwk-rotation") {
            secrets = {
              REGISTRY_OWNER_SECRET: process.env.REGISTRY_OWNER_SECRET || "",
              ADMIN_TOKEN: process.env.ADMIN_TOKEN || "",
            };
          } else if (appName === "indexer") {
            secrets = {
              STELLAR_TESTNET_RPC_URL: process.env.STELLAR_TESTNET_RPC_URL || "",
              STELLAR_TESTNET_FACTORY_ADDRESS: process.env.STELLAR_TESTNET_FACTORY_ADDRESS || "",
            };

            for (const name of [
              "STELLAR_TESTNET_NETWORK_PASSPHRASE",
              "STELLAR_MAINNET_RPC_URL",
              "STELLAR_MAINNET_FACTORY_ADDRESS",
              "STELLAR_MAINNET_NETWORK_PASSPHRASE",
            ]) {
              if (process.env[name]) secrets[name] = process.env[name];
            }
          } else {
            secrets = {
              PINATA_JWT: process.env.PINATA_JWT || "",
            };
          }

          if (appName === "jwk-rotation" && process.env.ALERT_WEBHOOK_URL) {
            secrets.ALERT_WEBHOOK_URL = process.env.ALERT_WEBHOOK_URL;
          }

          fs.writeFileSync(process.env.SECRET_FILE, JSON.stringify(secrets));
          NODE

          pnpm --filter "$PACKAGE_NAME" exec wrangler secret bulk "$secret_file"
        working-directory: web

      - name: Verify Worker runtime secrets
        if: ${{ matrix.app == 'pin-proxy' || matrix.app == 'jwk-rotation' || matrix.app == 'indexer' }}
        env:
          APP_NAME: ${{ matrix.app }}
          PACKAGE_NAME: ${{ matrix.package }}
        run: |
          secret_file="$(mktemp)"
          pnpm --filter "$PACKAGE_NAME" exec wrangler secret list --format=json > "$secret_file"

          SECRET_FILE="$secret_file" node <<'NODE'
          const fs = require("node:fs");

          const appName = process.env.APP_NAME;
          const secrets = JSON.parse(fs.readFileSync(process.env.SECRET_FILE, "utf8"));
          const present = new Set(secrets.map((secret) => secret.name));
          const required =
            appName === "jwk-rotation"
              ? ["REGISTRY_OWNER_SECRET", "ADMIN_TOKEN"]
              : appName === "indexer"
                ? [
                    "STELLAR_TESTNET_RPC_URL",
                    "STELLAR_TESTNET_FACTORY_ADDRESS",
                  ]
                : ["PINATA_JWT"];
          const missing = required.filter((name) => !present.has(name));

          if (missing.length > 0) {
            console.error(`Missing Cloudflare Worker secret(s) for ${appName}: ${missing.join(", ")}`);
            process.exit(1);
          }
          NODE
        working-directory: web

      - name: Verify indexer health
        if: ${{ matrix.app == 'indexer' }}
        env:
          WORKER_URL: ${{ matrix.url }}
        run: |
          for attempt in {1..10}; do
            health="$(curl -fsS "$WORKER_URL/health")"
            if HEALTH="$health" node <<'NODE'
          const health = JSON.parse(process.env.HEALTH);

          if (health.ok) {
            process.exit(0);
          }

          console.error(JSON.stringify(health, null, 2));
          process.exit(1);
          NODE
            then
              exit 0
            fi

            sleep 3
          done

          echo "::error::Indexer health check failed"
          exit 1

      - name: Verify jwk rotation health
        if: ${{ matrix.app == 'jwk-rotation' }}
        env:
          WORKER_URL: ${{ matrix.url }}
        run: |
          for attempt in {1..10}; do
            health="$(curl -fsS "$WORKER_URL/health")"
            if HEALTH="$health" node <<'NODE'
          const health = JSON.parse(process.env.HEALTH);

          if (health.hasRegistry && health.hasRpc && health.hasOwnerSecret && health.hasAdminToken) {
            process.exit(0);
          }

          console.error(JSON.stringify(health, null, 2));
          process.exit(1);
          NODE
            then
              exit 0
            fi

            sleep 3
          done

          echo "::error::jwk-rotation health check did not expose all required runtime bindings"
          exit 1
