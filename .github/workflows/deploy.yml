name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      app:
        description: "Which app to deploy on a manual run. 'all-safe' = every app EXCEPT create/claim (the VK-bound apps). Pick create/claim explicitly only after the on-chain verifier cutover."
        type: choice
        required: true
        default: all-safe
        options:
          - all-safe
          - landing
          - indexer
          - pin-proxy
          - jwk-rotation
          - create
          - claim

permissions:
  contents: read

jobs:
  # F-2 release-sequencing gate: create/claim bundle the VK-bound static
  # circuits/zarf.json, so they must NOT publish ahead of a matching on-chain
  # verifier cutover — neither on auto (merge to main) nor on a routine manual
  # run. The `matrix` context is NOT available in a job-level `if:` (only
  # github/inputs/needs/vars are — it evaluates to null there), so we compute the
  # app set HERE from event + input and feed it to the deploy job as a dynamic
  # matrix. A per-app job-level `if` referencing matrix.* would silently pass and
  # deploy everything. On CI success create/claim are excluded; on manual
  # dispatch the default 'all-safe' also excludes them, and an operator must pick
  # create/claim BY NAME (one at a time) to ship them — only AFTER the
  # coordinated contract redeploy + F-4 fixture gate
  # (docs/runbooks/circuit-redeploy-cutover.md).
  plan:
    name: Plan deploy set
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
      empty: ${{ steps.pick.outputs.empty }}
    steps:
      - name: Select apps to deploy
        id: pick
        env:
          EVENT_NAME: ${{ github.event_name }}
          PICK: ${{ inputs.app }}
        run: |
          node >> "$GITHUB_OUTPUT" <<'NODE'
          const ALL = [
            { app: 'landing', package: '@zarf/landing', kind: 'svelte', url: 'https://zarf.to' },
            { app: 'create', package: '@zarf/create', kind: 'svelte', url: 'https://create.zarf.to' },
            { app: 'claim', package: '@zarf/claim', kind: 'svelte', url: 'https://claim.zarf.to' },
            // Airdrop apps are wallet/Merkle based (NO Noir prover, NOT VK-bound),
            // so they ride the normal auto-deploy path. Their custom-domain routes
            // (airdrop.zarf.to / claim-drop.zarf.to) stay commented in wrangler until
            // the cutover runbook enables them; until then they deploy to *.workers.dev.
            { app: 'airdrop-create', package: '@zarf/airdrop-create', kind: 'svelte', url: 'https://airdrop.zarf.to' },
            { app: 'airdrop-claim', package: '@zarf/airdrop-claim', kind: 'svelte', url: 'https://claim-drop.zarf.to' },
            { app: 'indexer', package: '@zarf/indexer', kind: 'worker', url: 'https://indexer.zarf.to' },
            { app: 'pin-proxy', package: '@zarf/pin-proxy', kind: 'worker', url: 'zarf-pin-proxy' },
            { app: 'jwk-rotation', package: '@zarf/jwk-rotation', kind: 'worker', url: 'https://jwt.zarf.to' },
            { app: 'docs', package: '@zarf/docs', kind: 'worker', url: 'https://docs.zarf.to' },
          ];
          const VK = new Set(['create', 'claim']); // VK-bound: never auto/blanket deploy
          const event = process.env.EVENT_NAME;
          const pick = process.env.PICK || 'all-safe';
          const chosen =
            event === 'workflow_dispatch' && pick !== 'all-safe'
              ? ALL.filter((a) => a.app === pick) // explicit single app (create/claim only post-cutover)
              : ALL.filter((a) => !VK.has(a.app)); // auto + 'all-safe': exclude VK-bound apps
          console.log(`matrix=${JSON.stringify({ include: chosen })}`);
          console.log(`empty=${chosen.length === 0}`);
          NODE

  deploy:
    name: Deploy ${{ matrix.app }}
    needs: plan
    if: ${{ needs.plan.outputs.empty == 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: deploy-${{ matrix.app }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    # Only build-time configuration lives at job level. Credentials
    # (CLOUDFLARE_API_TOKEN, PINATA_JWT, REGISTRY_OWNER_SECRET, ADMIN_TOKEN)
    # are scoped to the exact steps that need them so `pnpm install`
    # lifecycle scripts and unrelated matrix apps never see them.
    env:
      VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID || secrets.VITE_GOOGLE_CLIENT_ID }}
      VITE_INDEXER_URL: ${{ vars.VITE_INDEXER_URL || secrets.VITE_INDEXER_URL || 'https://indexer.zarf.to' }}
      VITE_PIN_PROXY_URL: ${{ vars.VITE_PIN_PROXY_URL || secrets.VITE_PIN_PROXY_URL }}
      VITE_STELLAR_DEFAULT_NETWORK: ${{ vars.VITE_STELLAR_DEFAULT_NETWORK || secrets.VITE_STELLAR_DEFAULT_NETWORK }}
      VITE_STELLAR_TESTNET_RPC_URL: ${{ vars.VITE_STELLAR_TESTNET_RPC_URL || secrets.VITE_STELLAR_TESTNET_RPC_URL }}
      VITE_STELLAR_TESTNET_FACTORY_ADDRESS: ${{ vars.VITE_STELLAR_TESTNET_FACTORY_ADDRESS || secrets.VITE_STELLAR_TESTNET_FACTORY_ADDRESS }}
      VITE_STELLAR_MAINNET_RPC_URL: ${{ vars.VITE_STELLAR_MAINNET_RPC_URL || secrets.VITE_STELLAR_MAINNET_RPC_URL }}
      VITE_STELLAR_MAINNET_FACTORY_ADDRESS: ${{ vars.VITE_STELLAR_MAINNET_FACTORY_ADDRESS || secrets.VITE_STELLAR_MAINNET_FACTORY_ADDRESS }}
      # Airdrop factory addresses — REQUIRED for the airdrop-create/airdrop-claim
      # build (their coreInit throws at module-eval if no network resolves). Mirror
      # of the vesting factory vars above; set the matching repo var/secret before
      # deploying the airdrop apps.
      VITE_STELLAR_TESTNET_AIRDROP_FACTORY_ADDRESS: ${{ vars.VITE_STELLAR_TESTNET_AIRDROP_FACTORY_ADDRESS || secrets.VITE_STELLAR_TESTNET_AIRDROP_FACTORY_ADDRESS }}
      VITE_STELLAR_MAINNET_AIRDROP_FACTORY_ADDRESS: ${{ vars.VITE_STELLAR_MAINNET_AIRDROP_FACTORY_ADDRESS || secrets.VITE_STELLAR_MAINNET_AIRDROP_FACTORY_ADDRESS }}
      STELLAR_TESTNET_RPC_URL: ${{ vars.STELLAR_TESTNET_RPC_URL || secrets.STELLAR_TESTNET_RPC_URL || vars.VITE_STELLAR_TESTNET_RPC_URL || secrets.VITE_STELLAR_TESTNET_RPC_URL }}
      STELLAR_TESTNET_FACTORY_ADDRESS: ${{ vars.STELLAR_TESTNET_FACTORY_ADDRESS || secrets.STELLAR_TESTNET_FACTORY_ADDRESS || vars.VITE_STELLAR_TESTNET_FACTORY_ADDRESS || secrets.VITE_STELLAR_TESTNET_FACTORY_ADDRESS }}
      STELLAR_TESTNET_NETWORK_PASSPHRASE: ${{ vars.STELLAR_TESTNET_NETWORK_PASSPHRASE || secrets.STELLAR_TESTNET_NETWORK_PASSPHRASE }}
      STELLAR_MAINNET_RPC_URL: ${{ vars.STELLAR_MAINNET_RPC_URL || secrets.STELLAR_MAINNET_RPC_URL || vars.VITE_STELLAR_MAINNET_RPC_URL || secrets.VITE_STELLAR_MAINNET_RPC_URL }}
      STELLAR_MAINNET_FACTORY_ADDRESS: ${{ vars.STELLAR_MAINNET_FACTORY_ADDRESS || secrets.STELLAR_MAINNET_FACTORY_ADDRESS || vars.VITE_STELLAR_MAINNET_FACTORY_ADDRESS || secrets.VITE_STELLAR_MAINNET_FACTORY_ADDRESS }}
      STELLAR_MAINNET_NETWORK_PASSPHRASE: ${{ vars.STELLAR_MAINNET_NETWORK_PASSPHRASE || secrets.STELLAR_MAINNET_NETWORK_PASSPHRASE }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.23.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Check Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          missing=()
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::error::Missing required GitHub secret(s): %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Check frontend environment
        if: ${{ matrix.kind == 'svelte' }}
        env:
          APP_NAME: ${{ matrix.app }}
        run: |
          has_profile() {
            local prefix="$1"
            for suffix in RPC_URL FACTORY_ADDRESS; do
              local name="VITE_STELLAR_${prefix}_${suffix}"
              if [ -z "${!name:-}" ]; then
                return 1
              fi
            done
            return 0
          }

          missing=()
          if ! has_profile TESTNET; then
            missing+=(VITE_STELLAR_TESTNET_RPC_URL VITE_STELLAR_TESTNET_FACTORY_ADDRESS)
          fi

          if ! has_profile MAINNET; then
            echo '::warning::Mainnet profile needs VITE_STELLAR_MAINNET_RPC_URL and VITE_STELLAR_MAINNET_FACTORY_ADDRESS. The deployed UI will only offer configured Stellar networks.'
          fi

          if [ "$APP_NAME" = "create" ]; then
            if [ -z "${VITE_INDEXER_URL:-}" ]; then
              missing+=(VITE_INDEXER_URL)
            fi
            if [ -z "${VITE_PIN_PROXY_URL:-}" ]; then
              missing+=(VITE_PIN_PROXY_URL)
            fi
          fi

          if [ "$APP_NAME" = "claim" ]; then
            if [ -z "${VITE_INDEXER_URL:-}" ]; then
              missing+=(VITE_INDEXER_URL)
            fi
            if [ -z "${VITE_GOOGLE_CLIENT_ID:-}" ]; then
              missing+=(VITE_GOOGLE_CLIENT_ID)
            fi
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::error::Missing required frontend env for %s: %s\n' "$APP_NAME" "${missing[*]}"
            exit 1
          fi

      - name: Check Worker runtime secrets
        if: ${{ matrix.app == 'pin-proxy' || matrix.app == 'jwk-rotation' || matrix.app == 'indexer' }}
        env:
          APP_NAME: ${{ matrix.app }}
          PINATA_JWT: ${{ matrix.app == 'pin-proxy' && secrets.PINATA_JWT || '' }}
          REGISTRY_OWNER_SECRET: ${{ matrix.app == 'jwk-rotation' && secrets.REGISTRY_OWNER_SECRET || '' }}
          ADMIN_TOKEN: ${{ matrix.app == 'jwk-rotation' && secrets.ADMIN_TOKEN || '' }}
        run: |
          missing=()

          if [ "$APP_NAME" = "pin-proxy" ] && [ -z "${PINATA_JWT:-}" ]; then
            missing+=(PINATA_JWT)
          fi

          if [ "$APP_NAME" = "jwk-rotation" ]; then
            if [ -z "${REGISTRY_OWNER_SECRET:-}" ]; then
              missing+=(REGISTRY_OWNER_SECRET)
            fi
            if [ -z "${ADMIN_TOKEN:-}" ]; then
              missing+=(ADMIN_TOKEN)
            fi
          fi

          if [ "$APP_NAME" = "indexer" ]; then
            for name in STELLAR_TESTNET_RPC_URL STELLAR_TESTNET_FACTORY_ADDRESS; do
              if [ -z "${!name:-}" ]; then
                missing+=("$name")
              fi
            done
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::error::Missing required GitHub secret(s) for %s: %s\n' "$APP_NAME" "${missing[*]}"
            exit 1
          fi

      - name: Deploy ${{ matrix.app }}
        env:
          PACKAGE_NAME: ${{ matrix.package }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm --filter "$PACKAGE_NAME" run deploy
        working-directory: web

      - name: Sync Worker runtime secrets
        if: ${{ matrix.app == 'pin-proxy' || matrix.app == 'jwk-rotation' || matrix.app == 'indexer' }}
        env:
          APP_NAME: ${{ matrix.app }}
          PACKAGE_NAME: ${{ matrix.package }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PINATA_JWT: ${{ matrix.app == 'pin-proxy' && secrets.PINATA_JWT || '' }}
          REGISTRY_OWNER_SECRET: ${{ matrix.app == 'jwk-rotation' && secrets.REGISTRY_OWNER_SECRET || '' }}
          ADMIN_TOKEN: ${{ matrix.app == 'jwk-rotation' && secrets.ADMIN_TOKEN || '' }}
          ALERT_WEBHOOK_URL: ${{ matrix.app == 'jwk-rotation' && secrets.ALERT_WEBHOOK_URL || '' }}
        run: |
          secret_file="$(mktemp)"
          trap 'rm -f "$secret_file"' EXIT

          SECRET_FILE="$secret_file" node <<'NODE'
          const fs = require("node:fs");

          const appName = process.env.APP_NAME;
          let secrets;

          if (appName === "jwk-rotation") {
            secrets = {
              REGISTRY_OWNER_SECRET: process.env.REGISTRY_OWNER_SECRET || "",
              ADMIN_TOKEN: process.env.ADMIN_TOKEN || "",
            };
          } else if (appName === "indexer") {
            secrets = {
              STELLAR_TESTNET_RPC_URL: process.env.STELLAR_TESTNET_RPC_URL || "",
              STELLAR_TESTNET_FACTORY_ADDRESS: process.env.STELLAR_TESTNET_FACTORY_ADDRESS || "",
            };

            for (const name of [
              "STELLAR_TESTNET_NETWORK_PASSPHRASE",
              "STELLAR_MAINNET_RPC_URL",
              "STELLAR_MAINNET_FACTORY_ADDRESS",
              "STELLAR_MAINNET_NETWORK_PASSPHRASE",
            ]) {
              if (process.env[name]) secrets[name] = process.env[name];
            }
          } else {
            secrets = {
              PINATA_JWT: process.env.PINATA_JWT || "",
            };
          }

          if (appName === "jwk-rotation" && process.env.ALERT_WEBHOOK_URL) {
            secrets.ALERT_WEBHOOK_URL = process.env.ALERT_WEBHOOK_URL;
          }

          fs.writeFileSync(process.env.SECRET_FILE, JSON.stringify(secrets));
          NODE

          pnpm --filter "$PACKAGE_NAME" exec wrangler secret bulk "$secret_file"
        working-directory: web

      - name: Verify Worker runtime secrets
        if: ${{ matrix.app == 'pin-proxy' || matrix.app == 'jwk-rotation' || matrix.app == 'indexer' }}
        env:
          APP_NAME: ${{ matrix.app }}
          PACKAGE_NAME: ${{ matrix.package }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          secret_file="$(mktemp)"
          pnpm --filter "$PACKAGE_NAME" exec wrangler secret list --format=json > "$secret_file"

          SECRET_FILE="$secret_file" node <<'NODE'
          const fs = require("node:fs");

          const appName = process.env.APP_NAME;
          const secrets = JSON.parse(fs.readFileSync(process.env.SECRET_FILE, "utf8"));
          const present = new Set(secrets.map((secret) => secret.name));
          const required =
            appName === "jwk-rotation"
              ? ["REGISTRY_OWNER_SECRET", "ADMIN_TOKEN"]
              : appName === "indexer"
                ? [
                    "STELLAR_TESTNET_RPC_URL",
                    "STELLAR_TESTNET_FACTORY_ADDRESS",
                  ]
                : ["PINATA_JWT"];
          const missing = required.filter((name) => !present.has(name));

          if (missing.length > 0) {
            console.error(`Missing Cloudflare Worker secret(s) for ${appName}: ${missing.join(", ")}`);
            process.exit(1);
          }
          NODE
        working-directory: web

      - name: Verify indexer health
        if: ${{ matrix.app == 'indexer' }}
        env:
          WORKER_URL: ${{ matrix.url }}
        run: |
          for attempt in {1..10}; do
            health="$(curl -fsS "$WORKER_URL/health")"
            if HEALTH="$health" node <<'NODE'
          const health = JSON.parse(process.env.HEALTH);

          if (health.ok) {
            process.exit(0);
          }

          console.error(JSON.stringify(health, null, 2));
          process.exit(1);
          NODE
            then
              exit 0
            fi

            sleep 3
          done

          echo "::error::Indexer health check failed"
          exit 1

      - name: Verify jwk rotation health
        if: ${{ matrix.app == 'jwk-rotation' }}
        env:
          WORKER_URL: ${{ matrix.url }}
        run: |
          # /health is intentionally minimal ({ok:true}); secret presence is
          # verified independently by the "Verify Worker runtime secrets" step.
          for attempt in {1..10}; do
            health="$(curl -fsS "$WORKER_URL/health")"
            if HEALTH="$health" node <<'NODE'
          const health = JSON.parse(process.env.HEALTH);

          if (health.ok === true) {
            process.exit(0);
          }

          console.error(JSON.stringify(health, null, 2));
          process.exit(1);
          NODE
            then
              exit 0
            fi

            sleep 3
          done

          echo "::error::jwk-rotation health check failed"
          exit 1
